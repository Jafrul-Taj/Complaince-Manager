<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <div class="header-left">
      <h1>Branch Management</h1>
      <span class="total-badge">{{ dataSource.filteredData.length }} branches</span>
    </div>
    <button class="add-btn" (click)="openForm()">
      <mat-icon class="add-btn-icon">add</mat-icon>
      Add Branch
    </button>
  </div>

  <!-- Table card -->
  <div class="table-card">

    <!-- Toolbar -->
    <div class="table-toolbar">
      <div class="search-wrap">
        <mat-icon class="search-icon">search</mat-icon>
        <input class="search-input"
               (keyup)="applyFilter($event)"
               placeholder="Search by name or code…" />
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table mat-table [dataSource]="dataSource" matSort class="branch-table">

        <ng-container matColumnDef="branchCode">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
          <td mat-cell *matCellDef="let b">
            <span class="code-pill">{{ b.branchCode }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="branchName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Branch Name</th>
          <td mat-cell *matCellDef="let b" class="name-cell">{{ b.branchName }}</td>
        </ng-container>

        <ng-container matColumnDef="isActive">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let b">
            <span [class]="b.isActive ? 'badge badge-active' : 'badge badge-inactive'">
              <span class="badge-dot"></span>
              {{ b.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let b">
            <button class="action-btn edit-btn" (click)="openForm(b)" title="Edit">
              <mat-icon>edit</mat-icon>
            </button>
            <button class="action-btn delete-btn" (click)="delete(b)" title="Delete">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;" class="table-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-row" colspan="4">
            <mat-icon class="empty-icon">search_off</mat-icon>
            <span>No branches found</span>
          </td>
        </tr>
      </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons class="compact-paginator" />
  </div>
</div>
